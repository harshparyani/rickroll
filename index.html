<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>harsh.is</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0b0f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #overlay { position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 22px;
    background: #0b0b0f; color: #fff; z-index: 2; }
  #overlay h1 { font-size: 2rem; font-weight: 600; margin: 0; }
  #overlay p { color: #9a9aa3; margin: 0; }
  #overlay button { font-size: 1.1rem; padding: 12px 46px; cursor: pointer;
    border: 1px solid #fff; border-radius: 999px; background: transparent; color: #fff; }
  #overlay button:hover { background: #fff; color: #0b0b0f; }
  #frame { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; display: none; }
</style>
</head>
<body>
  <div id="overlay">
    <h1>harsh.is</h1>
    <p>Enter if you're freaky</p>
    <button id="enter">Enter</button>
  </div>

  <iframe id="frame"
    allow="autoplay; fullscreen"
    src="https://player.vimeo.com/video/1094756949?autoplay=1&loop=1&title=0&byline=0&portrait=0"
    tabindex="-1"></iframe>

  <script src="https://player.vimeo.com/api/player.js"></script>
  <script>
    const iframe = document.getElementById("frame");
    const overlay = document.getElementById("overlay");
    const player = new Vimeo.Player(iframe);

    // If the browser already trusts this domain, roll them instantly on load.
    player.play().catch(() => {});

    function reveal() {
      iframe.style.display = "block";
      iframe.tabIndex = "";
      overlay.style.display = "none";
    }

    // "Enter" is secretly Play. The click counts as user interaction,
    // which unlocks sound.
    document.getElementById("enter").addEventListener("click", () => {
      player.play().catch(() => {});
      reveal();
    });

    player.on("play", reveal);
  </script>
</body>
</html>
